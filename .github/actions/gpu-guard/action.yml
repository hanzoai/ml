name: gpu-guard
description: >-
  Fail fast when the GPU is already busy, to avoid contention with dev/bench
  work on these shared boxes (and the ROCm kfd wedge on Strix Halo, where two
  concurrent GPU inits permanently hang the driver until reboot).
runs:
  using: composite
  steps:
    - shell: bash
      run: |
        # Match the actual executable (anchored on argv[0]'s basename), not any
        # substring — so monitors like earlyoom, whose --prefer regex literally
        # contains "cargo"/"hanzo-bench", never trip us.
        busy=$(ps ax -o pid=,args= 2>/dev/null \
          | awk '{cmd=$2; n=split(cmd,a,"/"); exe=a[n];
                  if (exe ~ /^(llama-bench|llama-server|llama-cli|hanzo-bench)$/) print;
                  else if (exe=="cargo" && ($3=="test"||$3=="bench")) print}' \
          | grep -vE 'Runner\.|actions-runner|run(svc)?\.sh' || true)
        if [ -n "$busy" ]; then
          echo "::error::GPU busy — refusing to run to avoid contention"
          echo "$busy"
          exit 1
        fi
        echo "GPU free — proceeding"
