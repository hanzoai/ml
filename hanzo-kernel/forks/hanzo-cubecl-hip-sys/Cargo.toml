# hanzo-cubecl-hip-sys — a fork of cubecl-hip-sys 7.2.5321100 (Tracel Technologies Inc.,
# https://github.com/tracel-ai/cubecl-hip) carrying a single build.rs modification so the bindings
# resolve on ROCm >= 7.13 (see README.md + NOTICE). License is kept identical to upstream. The `[lib]`
# name stays `cubecl_hip_sys` so consumers' `use cubecl_hip_sys` keeps working via a package rename.
[package]
name = "hanzo-cubecl-hip-sys"
version = "7.2.5321101"
edition = "2021"
rust-version = "1.81"
authors = ["Tracel Technologies Inc."]
description = "Rust bindings for AMD ROCm HIP runtime libraries used by CubeCL. Hanzo fork of cubecl-hip-sys with a ROCm 7.13+ build.rs fallback (an unknown newer HIP patch selects the latest shipped bindings)."
readme = "README.md"
keywords = ["cubecl", "ROCm", "HIP", "API", "bindings"]
categories = ["external-ffi-bindings"]
license = "MIT OR Apache-2.0"
repository = "https://github.com/hanzoai/ml"
build = "build.rs"

[features]
default = []
# supported HIP patch versions
hip_41134 = []
hip_42131 = []
hip_42133 = []
hip_42134 = []
hip_43482 = []
hip_43483 = []
hip_43484 = []
hip_51831 = []
hip_52802 = []
hip_53211 = []

[lib]
name = "cubecl_hip_sys"
path = "src/lib.rs"

[dependencies]
libc = "0.2.159"
regex = "1.11.1"

[build-dependencies]
regex = "1.11.1"
